services:

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    profiles:
      - cloudflare
    env_file:
      - ./env/cloudflare.env
    command:
      - tunnel
      - run
    restart: unless-stopped

  postgres-server:
    image: dhi.io/postgres:17-alpine3.22
    env_file:
      - ./env/postgres-server.env
    volumes:
      - pgdata-server:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-validator:
    image: dhi.io/postgres:17-alpine3.22
    env_file:
      - ./env/postgres-validator.env
    volumes:
      - pgdata-validator:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  scim-server-db:
    image: edipal/scim-server-db:dev
    pull_policy: always
    env_file:
      - ./env/scim-server-db.env
    depends_on:
      postgres-server:
        condition: service_healthy

  scim-validator-db:
    image: edipal/scim-validator-db:dev
    pull_policy: always
    env_file:
      - ./env/scim-validator-db.env
    depends_on:
      postgres-validator:
        condition: service_healthy

  scim-server-impl-spring:
    image: edipal/scim-server-impl-spring:dev
    pull_policy: always
    ports:
      - "8080:8080"
    env_file:
      - ./env/scim-server-impl-spring.env
    environment:
      - SERVER_PORT=8080
    depends_on:
      scim-server-db:
        condition: service_completed_successfully
      postgres-server:
        condition: service_healthy
    restart: unless-stopped

  scim-server-ui-spring:
    image: edipal/scim-server-ui-spring:dev
    pull_policy: always
    ports:
      - "8081:8081"
    env_file:
      - ./env/scim-server-ui-spring.env
    environment:
      - SERVER_PORT=8081
    depends_on:
      postgres-server:
        condition: service_healthy
    restart: unless-stopped

  scim-validator-ui-spring:
    image: edipal/scim-validator-ui-spring:dev
    pull_policy: always
    ports:
      - "8082:8082"
    env_file:
      - ./env/scim-validator-ui-spring.env
    environment:
      - SERVER_PORT=8082
    depends_on:
      scim-validator-db:
        condition: service_completed_successfully
      postgres-validator:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata-server:
  pgdata-validator:
